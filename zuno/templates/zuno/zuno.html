<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuno AI Music Assistant</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f12;
            --primary-color: #7b2cbf;
            --secondary-color: #c77dff;
            --text-color: #ffffff;
            --text-muted: #a0aab2;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(123, 44, 191, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(199, 125, 255, 0.15), transparent 25%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        .mic-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .mic-container:hover {
            transform: scale(1.05);
        }

        .mic-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(123, 44, 191, 0.4);
            z-index: 2;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mic-button svg {
            width: 40px;
            height: 40px;
            fill: #ffffff;
        }

        .mic-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(199, 125, 255, 0.3);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        .listening .mic-ripple {
            animation: ripple 1.5s infinite;
        }

        @keyframes ripple {
            0% { width: 100px; height: 100px; opacity: 1; }
            100% { width: 250px; height: 250px; opacity: 0; }
        }

        .status-text {
            margin-top: 2rem;
            font-size: 1.2rem;
            min-height: 1.5rem;
            color: var(--text-color);
            transition: opacity 0.3s ease;
        }

        .transcription {
            margin-top: 1rem;
            font-size: 1.1rem;
            color: var(--secondary-color);
            font-style: italic;
            min-height: 1.5rem;
        }

        .results-container {
            margin-top: 2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            display: none;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-container h3 {
            margin-top: 0;
            color: var(--secondary-color);
            font-weight: 600;
        }

        .song-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .song-item {
            padding: 0.8rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }

        .song-item:last-child {
            border-bottom: none;
        }

        .song-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .song-artist {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 60, 60, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
        }

        /* Zuno Music Card styles */
        .main-music-card {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            padding: 18px;
            border-radius: 35px;
            background: #000;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 14px;
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .album-art {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .album-art:hover {
            transform: scale(1.05);
        }

        .track-details {
            flex-grow: 1;
            overflow: hidden;
        }

        .track-title {
            font-size: 1.3em;
            font-weight: 600;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            text-align: left;
        }

        .artist-name {
            font-size: 0.9em;
            color: #d1d1d6;
            margin-top: 2px;
            text-align: left;
        }

        .volume-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            width: 38px;
            height: 32px;
        }

        .volume-bars .bar {
            width: 3px;
            background: linear-gradient(180deg, #00c6ff, #0072ff);
            border-radius: 2px;
            animation: bounce 0.8s infinite ease-in-out;
            animation-delay: var(--delay);
            animation-play-state: running;
        }

        .volume-bars.paused .bar {
            animation-play-state: paused !important;
        }

        @keyframes bounce {
            0%, 100% { height: 6px; }
            50% { height: 26px; }
        }

        .playback-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #8e8e93;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border-radius: 2px;
        }

        .button-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .control-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            color: #fff;
            padding: 0;
        }

        .control-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .main-control-btns {
            justify-content: center;
            align-items: center;
            display: flex;
            flex: 1;
            gap: 8px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Zuno</h1>
        <p class="subtitle">Your intelligent voice-controlled music assistant</p>

        <div class="mic-container" id="micContainer">
            <div class="mic-ripple"></div>
            <button class="mic-button" id="micBtn" aria-label="Start recording">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
        </div>

        <div class="status-text" id="statusText">Tap to speak</div>
        <div class="transcription" id="transcriptionText"></div>

        <!-- Zuno Music Player Card -->
        <div id="zuno-music-player" style="display: none; align-items: center; justify-content: center; margin: 2rem 0;">
            <div class="main-music-card">
                <div class="track-info">
                    <div class="album-art" id="zuno-album-art"></div>
                    <div class="track-details">
                        <div class="track-title" id="zuno-track-title">Say play [song]</div>
                        <div class="artist-name" id="zuno-artist-name">to start playing</div>
                    </div>
                    <div class="volume-bars paused" id="zuno-volume-bars">
                        <div class="bar" style="--delay:0s"></div>
                        <div class="bar" style="--delay:0.1s"></div>
                        <div class="bar" style="--delay:0.2s"></div>
                        <div class="bar" style="--delay:0.3s"></div>
                        <div class="bar" style="--delay:0.4s"></div>
                        <div class="bar" style="--delay:0.5s"></div>
                        <div class="bar" style="--delay:0.6s"></div>
                        <div class="bar" style="--delay:0.7s"></div>
                    </div>
                </div>

                <div class="playback-controls">
                    <div class="time-info">
                        <span class="current-time" id="zuno-current-time">0:00</span>
                        <span class="remaining-time" id="zuno-remaining-time">-0:00</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="zuno-progress-fill" style="width: 0%;"></div>
                    </div>
                    <div class="button-row">
                        <div class="main-control-btns">
                            <button class="control-button back" id="zuno-btn-prev" title="Previous Track">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M4 4a.5.5 0 0 1 1 0v3.248l6.267-3.636c.54-.313 1.233.066 1.233.696v7.384c0 .63-.692 1.01-1.233.697L5 8.753V12a.5.5 0 0 1-1 0V4z"/>
                                </svg>
                            </button>
                            <button class="control-button back" id="zuno-btn-skip-back" title="Skip Back 10s">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path fill-rule="evenodd" d="M8 3a5 5 0 1 1-4.546 2.914.5.5 0 0 0-.908-.417A6 6 0 1 0 8 2v1z"/>
                                    <path d="M3.102 4c.04-.316.025-.617-.05-.9L2 3.5l-.2-.5 1.5-.7.5.2-.2 1.5H3.102z"/>
                                </svg>
                            </button>
                            <div class="play-pause-btns">
                                <button class="control-button play-pause-button" id="zuno-btn-play-pause" title="Play/Pause">
                                    <svg class="icon-play" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M11.596 8.697l-6.363 3.692c-.54.314-1.233-.065-1.233-.696V4.308c0-.63.693-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393"/>
                                    </svg>
                                    <svg class="icon-pause hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5m5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5"/>
                                    </svg>
                                </button>
                            </div>
                            <button class="control-button next" id="zuno-btn-skip-forward" title="Skip Forward 10s">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                                    <path d="M12.898 4c-.04-.316-.025-.617.05-.9L14 3.5l.2-.5-1.5-.7-.5.2.2 1.5h.5z"/>
                                </svg>
                            </button>
                            <button class="control-button next" id="zuno-btn-next" title="Next Track">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M12.5 4a.5.5 0 0 0-1 0v3.248L5.233 3.612C4.693 3.3 4 3.678 4 4.308v7.384c0 .63.692 1.01 1.233.697L11.5 8.753V12a.5.5 0 0 0 1 0V4z"/>
                                </svg>
                            </button>
                        </div>
                        <button class="control-button d" id="zuno-btn-radar" title="Open YouTube Tab">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M6.634 1.135A7 7 0 0 1 15 8a.5.5 0 0 1-1 0 6 6 0 1 0-6.5 5.98v-1.005A5 5 0 1 1 13 8a.5.5 0 0 1-1 0 4 4 0 1 0-4.5 3.969v-1.011A2.999 2.999 0 1 1 11 8a.5.5 0 0 1-1 0 2 2 0 1 0-2.5 1.936v-1.07a1 1 0 1 1 1 0V15.5a.5.5 0 0 1-1 0v-.518a7 7 0 0 1-.866-13.847"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="results-container" id="resultsContainer">
            <h3 id="resultsTitle">Search Results</h3>
            <ul class="song-list" id="songList">
                <!-- Dynamic results inserted here -->
            </ul>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const micContainer = document.getElementById('micContainer');
        const statusText = document.getElementById('statusText');
        const transcriptionText = document.getElementById('transcriptionText');
        const resultsContainer = document.getElementById('resultsContainer');
        const songList = document.getElementById('songList');
        const resultsTitle = document.getElementById('resultsTitle');
        const toast = document.getElementById('toast');

        // Zuno Music Player DOM Elements
        const zunoMusicPlayer = document.getElementById('zuno-music-player');
        const zunoTrackTitle = document.getElementById('zuno-track-title');
        const zunoArtistName = document.getElementById('zuno-artist-name');
        const zunoAlbumArt = document.getElementById('zuno-album-art');
        const zunoVolumeBars = document.getElementById('zuno-volume-bars');
        const zunoCurrentTime = document.getElementById('zuno-current-time');
        const zunoRemainingTime = document.getElementById('zuno-remaining-time');
        const zunoProgressFill = document.getElementById('zuno-progress-fill');

        const zunoBtnPrev = document.getElementById('zuno-btn-prev');
        const zunoBtnSkipBack = document.getElementById('zuno-btn-skip-back');
        const zunoBtnPlayPause = document.getElementById('zuno-btn-play-pause');
        const zunoBtnSkipForward = document.getElementById('zuno-btn-skip-forward');
        const zunoBtnNext = document.getElementById('zuno-btn-next');
        const zunoBtnRadar = document.getElementById('zuno-btn-radar');

        const EXTENSION_ID = "egobkkfkdjagkggbpfkadhfknjeofjab";
        let isListening = false;
        let musicStatusInterval = null;

        // Initialize Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            showToast("Speech Recognition API not supported in this browser.");
            micBtn.disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                isListening = true;
                micContainer.classList.add('listening');
                statusText.innerText = "Listening...";
                transcriptionText.innerText = "";
                resultsContainer.style.display = 'none';
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                transcriptionText.innerText = `"${transcript}"`;
                statusText.innerText = "Processing...";
                
                // Send to backend
                processAudio(transcript);
            };

            recognition.onerror = function(event) {
                isListening = false;
                micContainer.classList.remove('listening');
                statusText.innerText = "Error capturing audio.";
                showToast(`Error: ${event.error}`);
            };

            recognition.onend = function() {
                isListening = false;
                micContainer.classList.remove('listening');
                if (statusText.innerText === "Listening...") {
                    statusText.innerText = "Tap to speak";
                }
            };

            micBtn.addEventListener('click', () => {
                if (isListening) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });
        }

        async function processAudio(text) {
            try {
                const response = await fetch('/zuno/process_audio/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Unknown error occurred');
                }

                statusText.innerText = "Done!";
                
                if (data.intent === 'play_song' || data.status === 'play_extension') {
                    showToast(data.message || "Playing song...");
                    zunoMusicPlayer.style.display = 'flex';
                    resultsContainer.style.display = 'none';
                    
                    if (data.url) {
                        if (typeof chrome !== 'undefined' && chrome.runtime) {
                            try {
                                chrome.runtime.sendMessage(EXTENSION_ID, { action: "play_music", url: data.url }, response => {
                                    if (chrome.runtime.lastError || !response || !response.success) {
                                        window.location.href = data.url;
                                    } else {
                                        setTimeout(startPollingMusicStatus, 1500);
                                    }
                                });
                            } catch (e) {
                                window.location.href = data.url;
                            }
                        } else {
                            window.location.href = data.url;
                        }
                    }
                } else if (data.intent === 'search_artist') {
                    zunoMusicPlayer.style.display = 'none';
                    displayResults(data.query, data.results);
                }

            } catch (error) {
                console.error('Error:', error);
                statusText.innerText = "Failed to process request.";
                showToast(error.message);
            }
        }

        function displayResults(query, results) {
            resultsContainer.style.display = 'block';
            resultsTitle.innerText = `Search Results for "${query}"`;
            
            songList.innerHTML = '';
            
            if (!results || results.length === 0) {
                songList.innerHTML = '<li class="song-item"><div class="song-title">No results found.</div></li>';
                return;
            }

            results.forEach(song => {
                const li = document.createElement('li');
                li.className = 'song-item';
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'song-title';
                titleDiv.innerText = song.title;
                
                const artistDiv = document.createElement('div');
                artistDiv.className = 'song-artist';
                artistDiv.innerText = song.artists;

                li.appendChild(titleDiv);
                li.appendChild(artistDiv);
                songList.appendChild(li);
            });
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === null) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function updateMusicCardUI(data) {
            zunoTrackTitle.textContent = data.title || "Say play [song]";
            zunoArtistName.textContent = data.artist || "to start playing";
            
            if (data.albumArt) {
                zunoAlbumArt.style.backgroundImage = `url(${data.albumArt})`;
                zunoAlbumArt.style.backgroundSize = "cover";
                zunoAlbumArt.style.backgroundPosition = "center";
            } else {
                zunoAlbumArt.style.backgroundImage = "linear-gradient(135deg, #ff9a9e, #fad0c4)";
            }

            const iconPlay = zunoBtnPlayPause.querySelector(".icon-play");
            const iconPause = zunoBtnPlayPause.querySelector(".icon-pause");

            if (data.paused) {
                iconPlay.classList.remove("hidden");
                iconPause.classList.add("hidden");
                zunoVolumeBars.classList.add("paused");
            } else {
                iconPlay.classList.add("hidden");
                iconPause.classList.remove("hidden");
                zunoVolumeBars.classList.remove("paused");
            }

            const curTime = data.currentTime || 0;
            const durTime = data.duration || 0;
            zunoCurrentTime.textContent = formatTime(curTime);
            zunoRemainingTime.textContent = durTime > 0 ? `-${formatTime(durTime - curTime)}` : "-0:00";
            
            if (durTime > 0) {
                zunoProgressFill.style.width = `${(curTime / durTime) * 100}%`;
            } else {
                zunoProgressFill.style.width = "0%";
            }
        }

        function startPollingMusicStatus() {
            if (typeof chrome === 'undefined' || !chrome.runtime) return;
            if (musicStatusInterval) clearInterval(musicStatusInterval);
            
            zunoMusicPlayer.style.display = "flex";
            
            pollMusicStatus();
            musicStatusInterval = setInterval(pollMusicStatus, 1000);
        }

        function stopPollingMusicStatus() {
            if (musicStatusInterval) {
                clearInterval(musicStatusInterval);
                musicStatusInterval = null;
            }
        }

        function pollMusicStatus() {
            try {
                chrome.runtime.sendMessage(EXTENSION_ID, { action: "get_music_status" }, (response) => {
                    if (chrome.runtime.lastError) {
                        return;
                    }
                    if (response && response.success && response.data) {
                        updateMusicCardUI(response.data);
                    }
                });
            } catch (e) {
                // Ignore
            }
        }

        // Initialize control listeners
        if (typeof chrome !== 'undefined' && chrome.runtime) {
            zunoBtnPrev.addEventListener("click", () => {
                chrome.runtime.sendMessage(EXTENSION_ID, { action: "control_music", command: "previous" });
            });
            zunoBtnSkipBack.addEventListener("click", () => {
                chrome.runtime.sendMessage(EXTENSION_ID, { action: "control_music", command: "skip_backward" });
            });
            zunoBtnPlayPause.addEventListener("click", () => {
                chrome.runtime.sendMessage(EXTENSION_ID, { action: "control_music", command: "toggle_play" });
            });
            zunoBtnSkipForward.addEventListener("click", () => {
                chrome.runtime.sendMessage(EXTENSION_ID, { action: "control_music", command: "skip_forward" });
            });
            zunoBtnNext.addEventListener("click", () => {
                chrome.runtime.sendMessage(EXTENSION_ID, { action: "control_music", command: "next" });
            });
            zunoBtnRadar.addEventListener("click", () => {
                chrome.runtime.sendMessage(EXTENSION_ID, { action: "control_music", command: "focus_tab" });
            });
            
            // Check status if tab query contains music pages already
            chrome.runtime.sendMessage(EXTENSION_ID, { action: "get_music_status" }, (response) => {
                if (response && response.success) {
                    startPollingMusicStatus();
                }
            });
        } else {
            zunoBtnRadar.style.display = 'none';
        }

        function showToast(message) {
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
